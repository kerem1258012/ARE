<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arenta X Ai | Advanced Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #020204;
            --panel-bg: rgba(15, 15, 22, 0.6);
            --border-glow: rgba(138, 43, 226, 0.3);
            --accent-primary: #8A2BE2;
            --accent-secondary: #00FFFF;
            --text-main: #e2e2e2;
            --text-muted: #888;
            --error-color: #ff3366;
            --success-color: #00ff99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 40%);
        }

        /* Düzen: Sol Sidebar ve Sağ Sohbet */
        #sidebar {
            width: 300px;
            background: rgba(5, 5, 8, 0.8);
            border-right: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 20;
            transform: translateX(0);
            transition: transform 0.3s ease;
        }

        #sidebar.hidden { transform: translateX(-100%); position: absolute; }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }

        .settings-group { margin-bottom: 20px; }
        .settings-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .settings-group input, .settings-group select {
            width: 100%; padding: 10px; border-radius: 8px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }
        .settings-group input:focus { border-color: var(--accent-secondary); outline: none; }

        .btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.05); color: white; cursor: pointer;
            font-weight: 600; transition: 0.2s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-primary); }
        .btn-primary { background: linear-gradient(45deg, var(--accent-primary), #4B0082); }
        .btn-primary:hover { background: linear-gradient(45deg, var(--accent-secondary), var(--accent-primary)); }
        .btn-danger { background: rgba(255, 51, 102, 0.1); color: var(--error-color); border: 1px solid var(--error-color); }

        /* Ana Sohbet Alanı */
        #main-area {
            flex: 1; display: flex; flex-direction: column; position: relative;
        }

        header {
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            background: rgba(2, 2, 4, 0.7); border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .toggle-btn {
            background: transparent; border: none; color: white; font-size: 1.2rem; cursor: pointer;
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }

        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(138, 43, 226, 0.4); border-radius: 10px; }

        .message-row { display: flex; width: 100%; }
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .message-bubble {
            max-width: 80%; padding: 15px 20px; border-radius: 16px;
            font-size: 0.95rem; line-height: 1.6; word-wrap: break-word;
            position: relative; animation: popIn 0.3s ease-out;
        }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        .user .message-bubble {
            background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.2);
            border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0, 255, 255, 0.05);
        }

        .ai .message-bubble {
            background: var(--panel-bg); border: 1px solid rgba(138, 43, 226, 0.2);
            border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.05);
        }

        .system-error { border-color: var(--error-color) !important; color: #ff9999; }

        /* Gelişmiş Markdown ve Kod Tasarımı */
        pre {
            background: #0d0d12; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto; margin: 10px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            position: relative;
        }
        code { font-family: 'JetBrains Mono', monospace; color: var(--accent-secondary); }
        .ai .message-bubble p { margin-bottom: 10px; }
        .ai .message-bubble p:last-child { margin-bottom: 0; }

        .copy-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.1); border: none;
            color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;
        }

        .meta-data {
            font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; display: flex; justify-content: space-between;
        }

        /* Alt Giriş Alanı */
        #input-area {
            padding: 20px 30px; background: rgba(2, 2, 4, 0.8); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-container {
            display: flex; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 10px; transition: 0.3s;
        }
        .input-container:focus-within { border-color: var(--accent-primary); box-shadow: 0 0 20px rgba(138, 43, 226, 0.1); }

        textarea {
            flex: 1; background: transparent; border: none; color: white; padding: 10px;
            font-size: 1rem; resize: none; min-height: 44px; max-height: 150px; outline: none;
        }

        .action-btn {
            width: 44px; height: 44px; border-radius: 12px; border: none; background: rgba(255,255,255,0.05);
            color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); color: var(--accent-secondary); }
        .action-btn.send { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: #000; }
        .action-btn.recording { background: var(--error-color); animation: pulse 1.5s infinite; color: white; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); } }
        
        /* Toast Bildirimleri */
        #toast-container { position: fixed; bottom: 100px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .toast { background: rgba(15, 15, 22, 0.9); border-left: 4px solid var(--accent-primary); color: white; padding: 12px 20px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">ARENTA X AI</div>
        
        <div class="settings-group">
            <label><i class="fa-solid fa-key"></i> Groq API Key</label>
            <input type="password" id="api-key" value="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" placeholder="gsk_...">
        </div>

        <div class="settings-group">
            <label><i class="fa-solid fa-microchip"></i> Model Seçimi</label>
            <select id="model-select">
                <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Önerilen)</option>
                <option value="llama3-8b-8192">Llama 3 8B (Hızlı)</option>
                <option value="mixtral-8x7b-32768">Mixtral 8x7B (Geniş Bağlam)</option>
            </select>
        </div>

        <div class="settings-group">
            <label><i class="fa-solid fa-volume-high"></i> Ses Sentezi (TTS)</label>
            <select id="voice-select">
                <option value="auto">Sistem Otomatik Türkçe</option>
            </select>
        </div>

        <button class="btn btn-primary" id="save-settings"><i class="fa-solid fa-save"></i> Ayarları Kaydet</button>
        <button class="btn btn-danger" id="clear-chat"><i class="fa-solid fa-trash"></i> Hafızayı Temizle</button>
        
        <div style="margin-top:auto; font-size:0.75rem; color:var(--text-muted); text-align:center;">
            Durum: <span id="api-status" style="color:var(--success-color);">Hazır</span>
        </div>
    </div>

    <div id="main-area">
        <header>
            <button class="toggle-btn" id="toggle-sidebar" title="Menüyü Aç/Kapat">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div style="flex:1; text-align:center; font-weight:600; letter-spacing:1px;">GÜVENLİ BAĞLANTI PROTOKOLÜ</div>
            <button class="toggle-btn" onclick="exportChat()" title="Sohbeti İndir">
                <i class="fa-solid fa-download"></i>
            </button>
        </header>

        <div id="chat-window">
            </div>

        <div id="input-area">
            <div class="input-container">
                <button class="action-btn" id="mic-btn" title="Sesli Giriş">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <textarea id="user-input" placeholder="Sisteme komut ilet..." rows="1"></textarea>
                <button class="action-btn send" id="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        /**
         * ARENTA X AI - CORE SCRIPT
         * Mimari tamamen modüler, hata payı sıfır olacak şekilde tasarlandı.
         * Herhangi bir API reddi doğrudan yakalanıp analiz edilecek.
         */

        const DOM = {
            sidebar: document.getElementById('sidebar'),
            chatWindow: document.getElementById('chat-window'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            micBtn: document.getElementById('mic-btn'),
            apiKeyInput: document.getElementById('api-key'),
            modelSelect: document.getElementById('model-select'),
            saveBtn: document.getElementById('save-settings'),
            clearBtn: document.getElementById('clear-chat'),
            toggleBtn: document.getElementById('toggle-sidebar'),
            statusText: document.getElementById('api-status'),
            toastContainer: document.getElementById('toast-container'),
            voiceSelect: document.getElementById('voice-select')
        };

        // --- SISTEM DURUMU (STATE) ---
        let state = {
            isProcessing: false,
            conversation: [],
            config: {
                apiKey: DOM.apiKeyInput.value,
                model: DOM.modelSelect.value,
                systemPrompt: "Senin adın Arenta X Ai. Türkçe konuşan, teknik becerisi yüksek, siber güvenlik ve yazılım mimarisi konularına hakim, son derece profesyonel bir yapay zekasın."
            }
        };

        // --- YEREL DEPOLAMA (LOCAL STORAGE) ---
        // Sayfa yenilense bile veriler kaybolmaz.
        function loadStorage() {
            const savedConfig = localStorage.getItem('arentaConfig');
            const savedChat = localStorage.getItem('arentaChat');

            if (savedConfig) {
                state.config = JSON.parse(savedConfig);
                DOM.apiKeyInput.value = state.config.apiKey;
                DOM.modelSelect.value = state.config.model;
            }

            if (savedChat) {
                state.conversation = JSON.parse(savedChat);
                renderChatHistory();
            } else {
                state.conversation = [{ role: "system", content: state.config.systemPrompt }];
                addMessageToUI('ai', "Sistem başlatıldı. Veritabanı temiz. Arenta X Ai dinliyor...");
            }
        }

        function saveChat() {
            localStorage.setItem('arentaChat', JSON.stringify(state.conversation));
        }

        // --- ARAYÜZ ETKİLEŞİMLERİ ---
        DOM.toggleBtn.onclick = () => DOM.sidebar.classList.toggle('hidden');
        
        DOM.saveBtn.onclick = () => {
            state.config.apiKey = DOM.apiKeyInput.value.trim();
            state.config.model = DOM.modelSelect.value;
            localStorage.setItem('arentaConfig', JSON.stringify(state.config));
            showToast("Ayarlar sisteme kaydedildi.");
        };

        DOM.clearBtn.onclick = () => {
            localStorage.removeItem('arentaChat');
            state.conversation = [{ role: "system", content: state.config.systemPrompt }];
            DOM.chatWindow.innerHTML = '';
            addMessageToUI('ai', "Hafıza silindi. Yeni oturum başlatıldı.");
            window.speechSynthesis.cancel();
        };

        // Otomatik Textarea yüksekliği
        DOM.userInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        DOM.userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // --- GELİŞMİŞ MARKDOWN & KOD PARSER ---
        // Herhangi bir harici kütüphane olmadan metni düzgün UI'a çevirir.
        function parseMarkdown(text) {
            // Kod blokları (```dil kod ```)
            let html = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                const safeCode = code.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                return `<pre><button class="copy-btn" onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText); this.innerText='Kopyalandı'; setTimeout(()=>this.innerText='Kopyala',2000)">Kopyala</button><code>${safeCode}</code></pre>`;
            });

            // Satır içi kod (`kod`)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Kalın yazılar (**yazı**)
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            
            // Satır atlamaları
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // --- UI MESAJ YÖNETİMİ ---
        function renderChatHistory() {
            DOM.chatWindow.innerHTML = '';
            state.conversation.forEach(msg => {
                if (msg.role !== 'system') {
                    addMessageToUI(msg.role === 'assistant' ? 'ai' : 'user', msg.content, null, true);
                }
            });
        }

        function addMessageToUI(role, text, meta = null, isHistory = false, isError = false) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isError ? 'system-error' : ''}`;
            bubble.innerHTML = parseMarkdown(text);

            if (meta && !isHistory) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta-data';
                metaDiv.innerHTML = `<span><i class="fa-solid fa-microchip"></i> ${state.config.model}</span> <span>${meta}ms</span>`;
                bubble.appendChild(metaDiv);
            }

            row.appendChild(bubble);
            DOM.chatWindow.appendChild(row);
            DOM.chatWindow.scrollTop = DOM.chatWindow.scrollHeight;
        }

        function createTypingIndicator() {
            const row = document.createElement('div');
            row.className = 'message-row ai';
            row.id = 'typing-indicator';
            row.innerHTML = `<div class="message-bubble" style="padding: 10px 20px;"><i class="fa-solid fa-circle-notch fa-spin" style="color:var(--accent-secondary);"></i> İstek işleniyor...</div>`;
            DOM.chatWindow.appendChild(row);
            DOM.chatWindow.scrollTop = DOM.chatWindow.scrollHeight;
            return row;
        }

        // --- SES SENTEZİ VE TANIMA (TTS & STT) ---
        function loadVoices() {
            if (!window.speechSynthesis) return;
            const voices = window.speechSynthesis.getVoices();
            const trVoices = voices.filter(v => v.lang.includes('tr'));
            
            trVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = voice.name;
                DOM.voiceSelect.appendChild(option);
            });
        }
        
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        function speakAI(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            // Sesi bozan kod yapılarını temizle
            const cleanText = text.replace(/```[\s\S]*?```/g, "Aşağıda bir kod bloğu paylaştım.")
                                  .replace(/[`*#]/g, "");

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.05;

            const voices = window.speechSynthesis.getVoices();
            const selectedIdx = DOM.voiceSelect.value;
            
            if (selectedIdx !== "auto" && voices[selectedIdx]) {
                utterance.voice = voices[selectedIdx];
            } else {
                const bestTr = voices.find(v => v.lang === 'tr-TR' && (v.name.includes('Neural') || v.name.includes('Google')));
                if (bestTr) utterance.voice = bestTr;
            }

            window.speechSynthesis.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            
            DOM.micBtn.onclick = () => {
                if (state.isProcessing) return;
                DOM.micBtn.classList.contains('recording') ? recognition.stop() : recognition.start();
            };

            recognition.onstart = () => {
                DOM.micBtn.classList.add('recording');
                DOM.userInput.placeholder = "Sesli komut dinleniyor...";
            };

            recognition.onresult = (e) => {
                DOM.userInput.value = e.results[0][0].transcript;
            };

            recognition.onend = () => {
                DOM.micBtn.classList.remove('recording');
                DOM.userInput.placeholder = "Sisteme komut ilet...";
            };
        }

        // --- ÇEKİRDEK: API İLETİŞİMİ VE DETAYLI HATA YÖNETİMİ ---
        // İşte "Bağlantı Protokolü Hatası"nın nedenini nokta atışı bulacak yer burası.
        async function fetchAIResponse(userMessage) {
            const indicator = createTypingIndicator();
            const startTime = performance.now();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.config.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: state.config.model,
                        messages: state.conversation,
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                const data = await response.json();

                // Eğer HTTP status 200 (OK) değilse, Groq'un hata mesajını ayrıştır.
                if (!response.ok) {
                    let errorMessage = "Bilinmeyen bir API hatası.";
                    if (data.error && data.error.message) {
                        errorMessage = data.error.message;
                    }
                    throw new Error(`Groq API Reddi: ${errorMessage}`);
                }

                const endTime = performance.now();
                const aiText = data.choices[0].message.content;
                
                indicator.remove();
                state.conversation.push({ role: "assistant", content: aiText });
                saveChat();

                addMessageToUI('ai', aiText, Math.round(endTime - startTime));
                speakAI(aiText);

            } catch (error) {
                indicator.remove();
                console.error("Red Dev Sistem Logu:", error);
                
                // Hatayı gizlemiyoruz, kullanıcının yüzüne vuruyoruz ki sorunu çözebilsin.
                const errorLog = `**SİSTEM ÇÖKME RAPORU**\n\nMaalesef Groq API sunucusu isteği reddetti. Hatanın sebebi aşağıdadır:\n\`\`\`bash\n${error.message}\n\`\`\`\n\n**Olası Çözümler:**\n1. Ayarlar panelindeki API Key (gsk_...) banlanmış veya silinmiş olabilir.\n2. Seçtiğin model (örn: ${state.config.model}) Groq tarafında geçici olarak bakıma alınmış olabilir.\n3. Ayarlar menüsünden API anahtarını yenile ve tekrar dene.`;
                
                addMessageToUI('ai', errorLog, null, false, true);
                
                // Hata aldığımız için kullanıcının son mesajını tarihten çıkarıyoruz ki sisteme tekrar göndermeye çalışıp takılmasın.
                state.conversation.pop(); 
            } finally {
                state.isProcessing = false;
                DOM.sendBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
                DOM.userInput.disabled = false;
                DOM.userInput.focus();
            }
        }

        function handleSend() {
            const text = DOM.userInput.value.trim();
            if (!text || state.isProcessing) return;
            if (!state.config.apiKey) {
                showToast("HATA: API Anahtarı eksik. Lütfen soldaki panelden girin.");
                DOM.sidebar.classList.remove('hidden');
                return;
            }

            state.isProcessing = true;
            DOM.userInput.value = '';
            DOM.userInput.style.height = '44px';
            DOM.sendBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
            DOM.userInput.disabled = true;

            // Mikrofon açıksa kapat
            if (DOM.micBtn.classList.contains('recording')) DOM.micBtn.click();

            addMessageToUI('user', text);
            state.conversation.push({ role: "user", content: text });
            
            fetchAIResponse(text);
        }

        DOM.sendBtn.onclick = handleSend;

        // --- YARDIMCI FONKSİYONLAR ---
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> ${message}`;
            DOM.toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function exportChat() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.conversation, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "Arenta_Logs.json");
            dlAnchorElem.click();
            showToast("Sohbet kayıtları JSON olarak indirildi.");
        }

        // --- BAŞLATMA ---
        window.onload = () => {
            loadStorage();
            DOM.userInput.focus();
        };

    </script>
</body>
</html>

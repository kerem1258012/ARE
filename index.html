<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Nexus Platform - Advanced UI">
    <meta name="theme-color" content="#09090b">
    <title>Nexus Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-elevated: #f4f4f5;
            --bg-element: #e4e4e7;
            --bg-surface: #fafafa;
            --border-color: #e4e4e7;
            --border-hover: #d4d4d8;
            --text-primary: #09090b;
            --text-secondary: #71717a;
            --text-muted: #a1a1aa;
            --brand-primary: #18181b;
            --brand-hover: #27272a;
            --brand-text: #ffffff;
            --danger-bg: #fef2f2;
            --danger-text: #ef4444;
            --success-bg: #ecfdf5;
            --success-text: #10b981;
            --warning-bg: #fffbeb;
            --warning-text: #f59e0b;
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --transition-fast: all 0.1s ease;
            --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.3s ease-in-out;
            --z-index-dropdown: 1000;
            --z-index-sticky: 1020;
            --z-index-fixed: 1030;
            --z-index-modal: 1040;
            --z-index-popover: 1050;
            --z-index-tooltip: 1060;
        }
        [data-theme="dark"] {
            --bg-base: #09090b;
            --bg-elevated: #18181b;
            --bg-element: #27272a;
            --bg-surface: #0f0f12;
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --brand-primary: #ffffff;
            --brand-hover: #f4f4f5;
            --brand-text: #09090b;
            --danger-bg: #450a0a;
            --danger-text: #fca5a5;
            --success-bg: #064e3b;
            --success-text: #6ee7b7;
            --warning-bg: #451a03;
            --warning-text: #fbbf24;
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5714;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-fast);
        }
        button, input, textarea, select {
            font-family: inherit;
            font-size: inherit;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            user-select: none;
        }
        ul {
            list-style: none;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .hidden {
            display: none !important;
        }
        .flex {
            display: flex;
        }
        .inline-flex {
            display: inline-flex;
        }
        .items-center {
            align-items: center;
        }
        .justify-center {
            justify-content: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .flex-col {
            flex-direction: column;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .flex-1 {
            flex: 1 1 0%;
        }
        .gap-1 {
            gap: 0.25rem;
        }
        .gap-2 {
            gap: 0.5rem;
        }
        .gap-3 {
            gap: 0.75rem;
        }
        .gap-4 {
            gap: 1rem;
        }
        .gap-6 {
            gap: 1.5rem;
        }
        .w-full {
            width: 100%;
        }
        .h-full {
            height: 100%;
        }
        .p-2 {
            padding: 0.5rem;
        }
        .p-4 {
            padding: 1rem;
        }
        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }
        .mt-2 {
            margin-top: 0.5rem;
        }
        .mb-2 {
            margin-bottom: 0.5rem;
        }
        .text-center {
            text-align: center;
        }
        .text-xs {
            font-size: 0.75rem;
        }
        .text-sm {
            font-size: 0.875rem;
        }
        .font-medium {
            font-weight: 500;
        }
        .font-semibold {
            font-weight: 600;
        }
        .font-bold {
            font-weight: 700;
        }
        .uppercase {
            text-transform: uppercase;
        }
        .tracking-tight {
            letter-spacing: -0.025em;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.875rem;
            transition: var(--transition-base);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
        }
        .btn-lg {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
        }
        .btn-primary {
            background-color: var(--brand-primary);
            color: var(--brand-text);
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--brand-hover);
            transform: translateY(-1px);
        }
        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            background-color: var(--bg-element);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background-color: var(--border-color);
        }
        .btn-ghost {
            color: var(--text-secondary);
            padding: 0.5rem;
            background: transparent;
        }
        .btn-ghost:hover {
            background-color: var(--bg-element);
            color: var(--text-primary);
        }
        .btn-danger {
            background-color: var(--danger-bg);
            color: var(--danger-text);
        }
        .btn-danger:hover {
            opacity: 0.9;
        }
        .icon-btn {
            padding: 0.5rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: var(--transition-base);
        }
        .icon-btn:hover {
            background-color: var(--bg-element);
            color: var(--text-primary);
        }
        .icon-btn svg {
            width: 1.25rem;
            height: 1.25rem;
        }
        .input-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .input-wrapper-inner {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: var(--transition-base);
        }
        .input-control:hover {
            border-color: var(--border-hover);
        }
        .input-control:focus {
            border-color: var(--text-secondary);
            box-shadow: 0 0 0 2px var(--bg-element);
        }
        .input-control::placeholder {
            color: var(--text-muted);
        }
        #toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: var(--z-index-tooltip);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }
        .toast {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: var(--shadow-lg);
            animation: toastSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            min-width: 300px;
            max-width: 450px;
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            pointer-events: auto;
        }
        .toast.error {
            background-color: var(--danger-bg);
            color: var(--danger-text);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .toast.success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border-color: rgba(16, 185, 129, 0.2);
        }
        @keyframes toastSlideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes toastSlideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        #view-auth {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-elevated);
            padding: 1.5rem;
        }
        .auth-card {
            background-color: var(--bg-base);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            font-size: 0.9375rem;
            color: var(--text-secondary);
        }
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .auth-link {
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-fast);
            margin-left: 0.25rem;
        }
        .auth-link:hover {
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        #view-app {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .app-sidebar {
            width: 280px;
            background-color: var(--bg-elevated);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: var(--z-index-sticky);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid transparent;
        }
        .avatar-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background-color: var(--bg-element);
            border: 1px solid var(--border-color);
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .workspace-name {
            font-weight: 600;
            font-size: 0.9375rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            scrollbar-width: thin;
        }
        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: var(--radius-full);
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .history-item {
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition-base);
            position: relative;
        }
        .history-item:hover {
            background-color: var(--bg-element);
            color: var(--text-primary);
        }
        .history-item.active {
            background-color: var(--bg-element);
            color: var(--text-primary);
            font-weight: 600;
        }
        .history-item-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .sidebar-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-elevated);
        }
        .app-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            position: relative;
            min-width: 0;
        }
        .app-header {
            height: 64px;
            padding: 0 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(var(--bg-base), 0.8);
            backdrop-filter: blur(8px);
            z-index: var(--z-index-sticky);
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        .chat-content-wrapper {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            padding: 3rem 1.5rem;
        }
        .message-row {
            display: flex;
            gap: 1.25rem;
            width: 100%;
            animation: messageFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes messageFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-row.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            background-color: var(--bg-element);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .message-row.ai .message-avatar {
            border-radius: 50%;
            overflow: hidden;
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
        }
        .message-row.ai .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .message-body {
            max-width: 80%;
            font-size: 0.9375rem;
            line-height: 1.625;
            color: var(--text-primary);
            position: relative;
        }
        .message-row.user .message-body {
            background-color: var(--bg-elevated);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-lg);
            border-top-right-radius: 4px;
            box-shadow: var(--shadow-sm);
        }
        .message-row.ai .message-body {
            padding: 0.25rem 0;
        }
        .message-body p {
            margin-bottom: 1rem;
        }
        .message-body p:last-child {
            margin-bottom: 0;
        }
        .message-body pre {
            background-color: var(--bg-elevated);
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--border-color);
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }
        .message-body code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background-color: var(--bg-element);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-weight: 500;
        }
        .message-body pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }
        .message-body ul, .message-body ol {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }
        .message-body li {
            margin-bottom: 0.5rem;
        }
        .input-section {
            padding: 1.5rem;
            background: linear-gradient(to top, var(--bg-base) 80%, transparent);
            border-top: 1px solid transparent;
            position: relative;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 0.625rem;
            display: flex;
            align-items: flex-end;
            box-shadow: var(--shadow-md);
            transition: var(--transition-base);
        }
        .input-wrapper:focus-within {
            border-color: var(--text-secondary);
            box-shadow: var(--shadow-lg);
            background-color: var(--bg-base);
        }
        .compose-textarea {
            width: 100%;
            max-height: 240px;
            min-height: 44px;
            padding: 0.625rem 0.875rem;
            resize: none;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.5;
            background: transparent;
        }
        .compose-textarea::-webkit-scrollbar {
            width: 4px;
        }
        .compose-textarea::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: var(--radius-full);
        }
        .compose-actions {
            display: flex;
            padding: 0.25rem;
            flex-shrink: 0;
            gap: 0.5rem;
        }
        .send-button {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background-color: var(--brand-primary);
            color: var(--brand-text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-base);
            box-shadow: var(--shadow-sm);
        }
        .send-button:hover:not(:disabled) {
            background-color: var(--brand-hover);
            transform: scale(1.05);
        }
        .send-button:active:not(:disabled) {
            transform: scale(0.95);
        }
        .send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        svg {
            width: 1.25rem;
            height: 1.25rem;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
            align-items: center;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        @media (max-width: 768px) {
            .app-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .app-sidebar.open {
                transform: translateX(0);
            }
            .message-body {
                max-width: 90%;
            }
            .chat-content-wrapper {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <div id="toast-container"></div>
    <div id="view-auth">
        <div class="auth-card" id="form-login">
            <div class="auth-header">
                <h1>Giriş Yap</h1>
                <p>Nexus Platform'a hoş geldiniz.</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label class="input-label" for="login-username">Kullanıcı Adı</label>
                    <div class="input-wrapper-inner">
                        <input type="text" id="login-username" class="input-control" required autocomplete="username" placeholder="kullanici_adi">
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="login-password">Şifre</label>
                    <div class="input-wrapper-inner">
                        <input type="password" id="login-password" class="input-control" required autocomplete="current-password" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full mt-2">Giriş Yap</button>
            </form>
            <div class="auth-footer">
                Hesabınız yok mu? <span class="auth-link" id="go-to-register">Kayıt Ol</span>
            </div>
        </div>
        <div class="auth-card hidden" id="form-register">
            <div class="auth-header">
                <h1>Hesap Oluştur</h1>
                <p>Hızlıca bir profil oluşturun.</p>
            </div>
            <form id="register-form">
                <div class="input-group">
                    <label class="input-label" for="reg-username">Kullanıcı Adı</label>
                    <div class="input-wrapper-inner">
                        <input type="text" id="reg-username" class="input-control" required autocomplete="username" placeholder="kullanici_adi">
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="reg-password">Şifre</label>
                    <div class="input-wrapper-inner">
                        <input type="password" id="reg-password" class="input-control" required autocomplete="new-password" placeholder="••••••••">
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="reg-confirm">Şifre Onayı</label>
                    <div class="input-wrapper-inner">
                        <input type="password" id="reg-confirm" class="input-control" required autocomplete="new-password" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full mt-2">Kayıt Ol</button>
            </form>
            <div class="auth-footer">
                Zaten üye misiniz? <span class="auth-link" id="go-to-login">Giriş Yap</span>
            </div>
        </div>
    </div>
    <div id="view-app" class="hidden">
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="btn btn-primary w-full flex justify-between items-center" id="btn-new-chat">
                    <span>Yeni Sohbet</span>
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <div class="sidebar-content">
                <div class="text-xs font-bold color-text-muted px-2 mb-2 uppercase tracking-tight">Geçmiş</div>
                <ul class="history-list" id="sidebar-history"></ul>
            </div>
            <div class="sidebar-footer">
                <div class="flex items-center gap-2">
                    <div class="message-avatar" id="current-user-avatar">U</div>
                    <span class="workspace-name" id="current-user-name">Kullanıcı</span>
                </div>
                <div class="flex gap-1">
                    <button class="icon-btn" id="btn-theme-toggle" title="Görünüm">
                        <svg viewBox="0 0 24 24" id="theme-icon-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <button class="icon-btn" id="btn-logout" title="Çıkış">
                        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-4">
                    <button class="icon-btn" id="sidebar-toggle" style="display: none;">
                        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="workspace-name" id="chat-title">Yeni Sohbet</div>
                </div>
            </header>
            <div class="chat-container" id="chat-scroll-area">
                <div class="chat-content-wrapper" id="chat-messages"></div>
            </div>
            <div class="input-section">
                <div class="input-wrapper">
                    <textarea 
                        id="chat-input" 
                        class="compose-textarea" 
                        placeholder="Bir mesaj yazın..." 
                        rows="1"
                    ></textarea>
                    <div class="compose-actions">
                        <button class="send-button" id="btn-send">
                            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const App = (() => {
            const CONFIG = {
                API: {
                    KEY: "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",
                    URL: "https://api.groq.com/openai/v1/chat/completions",
                    MODEL: "llama3-8b-8192"
                },
                STORAGE: {
                    USERS: "nexus_users",
                    SESSIONS: "nexus_sessions_",
                    THEME: "nexus_theme"
                },
                ASSETS: {
                    AI_LOGO: "https://i.imgur.com/oI8HOo2.png"
                }
            };
            const State = {
                currentUser: null,
                sessions: [],
                activeSessionId: null,
                isPending: false,
                theme: "dark"
            };
            const DOM = {
                toast: document.getElementById('toast-container'),
                authView: document.getElementById('view-auth'),
                appView: document.getElementById('view-app'),
                loginForm: document.getElementById('login-form'),
                registerForm: document.getElementById('register-form'),
                loginCard: document.getElementById('form-login'),
                registerCard: document.getElementById('form-register'),
                toRegister: document.getElementById('go-to-register'),
                toLogin: document.getElementById('go-to-login'),
                chatInput: document.getElementById('chat-input'),
                btnSend: document.getElementById('btn-send'),
                chatMessages: document.getElementById('chat-messages'),
                chatScroll: document.getElementById('chat-scroll-area'),
                sidebarHistory: document.getElementById('sidebar-history'),
                currentUserName: document.getElementById('current-user-name'),
                btnNewChat: document.getElementById('btn-new-chat'),
                btnTheme: document.getElementById('btn-theme-toggle'),
                btnLogout: document.getElementById('btn-logout'),
                chatTitle: document.getElementById('chat-title')
            };
            const Utils = {
                uuid: () => Math.random().toString(36).substring(2, 11),
                escape: (str) => {
                    const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
                    return str.replace(/[&<>"']/g, (m) => map[m]);
                },
                delay: (ms) => new Promise(res => setTimeout(res, ms)),
                formatDate: (timestamp) => {
                    return new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit' }).format(timestamp);
                }
            };
            const DB = {
                saveUser: (user) => {
                    const users = DB.getUsers();
                    users.push(user);
                    localStorage.setItem(CONFIG.STORAGE.USERS, JSON.stringify(users));
                },
                getUsers: () => JSON.parse(localStorage.getItem(CONFIG.STORAGE.USERS) || "[]"),
                saveSession: (userId, session) => {
                    const sessions = DB.getSessions(userId);
                    const idx = sessions.findIndex(s => s.id === session.id);
                    if (idx > -1) sessions[idx] = session;
                    else sessions.unshift(session);
                    localStorage.setItem(CONFIG.STORAGE.SESSIONS + userId, JSON.stringify(sessions));
                },
                getSessions: (userId) => JSON.parse(localStorage.getItem(CONFIG.STORAGE.SESSIONS + userId) || "[]"),
                deleteSession: (userId, sessionId) => {
                    const sessions = DB.getSessions(userId).filter(s => s.id !== sessionId);
                    localStorage.setItem(CONFIG.STORAGE.SESSIONS + userId, JSON.stringify(sessions));
                }
            };
            const UI = {
                showToast: (msg, type = 'error') => {
                    const t = document.createElement('div');
                    t.className = `toast ${type}`;
                    t.innerHTML = `<span>${msg}</span>`;
                    DOM.toast.appendChild(t);
                    setTimeout(() => {
                        t.style.animation = 'toastSlideOut 0.4s forwards';
                        setTimeout(() => t.remove(), 400);
                    }, 3500);
                },
                toggleAuth: (view) => {
                    if (view === 'register') {
                        DOM.loginCard.classList.add('hidden');
                        DOM.registerCard.classList.remove('hidden');
                    } else {
                        DOM.registerCard.classList.add('hidden');
                        DOM.loginCard.classList.remove('hidden');
                    }
                },
                autoResize: () => {
                    DOM.chatInput.style.height = 'auto';
                    DOM.chatInput.style.height = Math.min(DOM.chatInput.scrollHeight, 240) + 'px';
                },
                scrollToBottom: () => {
                    DOM.chatScroll.scrollTop = DOM.chatScroll.scrollHeight;
                },
                renderHistory: () => {
                    DOM.sidebarHistory.innerHTML = '';
                    State.sessions.forEach(s => {
                        const li = document.createElement('li');
                        li.className = `history-item ${State.activeSessionId === s.id ? 'active' : ''}`;
                        li.innerHTML = `
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            <span class="history-item-text">${Utils.escape(s.title)}</span>
                        `;
                        li.onclick = () => Chat.loadSession(s.id);
                        DOM.sidebarHistory.appendChild(li);
                    });
                }
            };
            const Auth = {
                register: (e) => {
                    e.preventDefault();
                    const u = document.getElementById('reg-username').value.trim();
                    const p = document.getElementById('reg-password').value;
                    const c = document.getElementById('reg-confirm').value;
                    if (u.length < 3) return UI.showToast("Kullanıcı adı çok kısa");
                    if (p.length < 6) return UI.showToast("Şifre en az 6 karakter olmalı");
                    if (p !== c) return UI.showToast("Şifreler eşleşmiyor");
                    if (DB.getUsers().find(x => x.username === u)) return UI.showToast("Bu kullanıcı zaten var");
                    DB.saveUser({ username: u, password: p });
                    UI.showToast("Hesap oluşturuldu!", "success");
                    UI.toggleAuth('login');
                },
                login: (e) => {
                    e.preventDefault();
                    const u = document.getElementById('login-username').value.trim();
                    const p = document.getElementById('login-password').value;
                    const user = DB.getUsers().find(x => x.username === u && x.password === p);
                    if (!user) return UI.showToast("Geçersiz kullanıcı adı veya şifre");
                    State.currentUser = user;
                    Auth.initApp();
                },
                initApp: () => {
                    DOM.authView.classList.add('hidden');
                    DOM.appView.classList.remove('hidden');
                    DOM.currentUserName.textContent = State.currentUser.username;
                    State.sessions = DB.getSessions(State.currentUser.username);
                    UI.renderHistory();
                    if (State.sessions.length > 0) Chat.loadSession(State.sessions[0].id);
                    else Chat.createNew();
                },
                logout: () => {
                    State.currentUser = null;
                    State.activeSessionId = null;
                    DOM.appView.classList.add('hidden');
                    DOM.authView.classList.remove('hidden');
                }
            };
            const Chat = {
                createNew: () => {
                    const id = Utils.uuid();
                    const session = { id, title: "Yeni Sohbet", messages: [], created: Date.now() };
                    State.activeSessionId = id;
                    DOM.chatMessages.innerHTML = '';
                    DOM.chatTitle.textContent = "Yeni Sohbet";
                    UI.renderHistory();
                },
                loadSession: (id) => {
                    const session = State.sessions.find(s => s.id === id);
                    if (!session) return;
                    State.activeSessionId = id;
                    DOM.chatTitle.textContent = session.title;
                    DOM.chatMessages.innerHTML = '';
                    session.messages.forEach(m => Chat.appendMessage(m.role, m.content));
                    UI.renderHistory();
                    UI.scrollToBottom();
                },
                appendMessage: (role, content) => {
                    const row = document.createElement('div');
                    row.className = `message-row ${role}`;
                    const avatar = role === 'user' ? State.currentUser.username[0].toUpperCase() : `<img src="${CONFIG.ASSETS.AI_LOGO}" alt="AI">`;
                    row.innerHTML = `
                        <div class="message-avatar">${avatar}</div>
                        <div class="message-body">${Utils.escape(content).replace(/\n/g, '<br>')}</div>
                    `;
                    DOM.chatMessages.appendChild(row);
                    UI.scrollToBottom();
                },
                sendMessage: async () => {
                    const content = DOM.chatInput.value.trim();
                    if (!content || State.isPending) return;
                    State.isPending = true;
                    DOM.btnSend.disabled = true;
                    DOM.chatInput.value = '';
                    UI.autoResize();
                    Chat.appendMessage('user', content);
                    const loading = document.createElement('div');
                    loading.className = 'message-row ai';
                    loading.innerHTML = `
                        <div class="message-avatar"><img src="${CONFIG.ASSETS.AI_LOGO}"></div>
                        <div class="message-body"><div class="loading-dots"><span></span><span></span><span></span></div></div>
                    `;
                    DOM.chatMessages.appendChild(loading);
                    UI.scrollToBottom();
                    try {
                        const session = State.sessions.find(s => s.id === State.activeSessionId) || {
                            id: State.activeSessionId,
                            title: content.substring(0, 30) + "...",
                            messages: [],
                            created: Date.now()
                        };
                        const response = await fetch(CONFIG.API.URL, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${CONFIG.API.KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                model: CONFIG.API.MODEL,
                                messages: [...session.messages, { role: 'user', content }]
                            })
                        });
                        const data = await response.json();
                        loading.remove();
                        if (data.choices && data.choices[0]) {
                            const aiMsg = data.choices[0].message.content;
                            Chat.appendMessage('ai', aiMsg);
                            session.messages.push({ role: 'user', content }, { role: 'assistant', content: aiMsg });
                            DB.saveSession(State.currentUser.username, session);
                            State.sessions = DB.getSessions(State.currentUser.username);
                            UI.renderHistory();
                        } else {
                            throw new Error("API Hatası");
                        }
                    } catch (err) {
                        loading.remove();
                        UI.showToast("İstek gönderilemedi.");
                        console.error(err);
                    } finally {
                        State.isPending = false;
                        DOM.btnSend.disabled = false;
                    }
                }
            };
            const Events = () => {
                DOM.toRegister.onclick = () => UI.toggleAuth('register');
                DOM.toLogin.onclick = () => UI.toggleAuth('login');
                DOM.loginForm.onsubmit = Auth.login;
                DOM.registerForm.onsubmit = Auth.register;
                DOM.btnNewChat.onclick = Chat.createNew;
                DOM.btnLogout.onclick = Auth.logout;
                DOM.btnTheme.onclick = () => {
                    State.theme = State.theme === 'dark' ? 'light' : 'dark';
                    document.body.setAttribute('data-theme', State.theme);
                };
                DOM.chatInput.oninput = UI.autoResize;
                DOM.chatInput.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        Chat.sendMessage();
                    }
                };
                DOM.btnSend.onclick = Chat.sendMessage;
            };
            return {
                init: () => {
                    Events();
                    const savedTheme = localStorage.getItem(CONFIG.STORAGE.THEME) || "dark";
                    document.body.setAttribute('data-theme', savedTheme);
                }
            };
        })();
        window.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>

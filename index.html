<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENTA - İşlevsel Yapay Zeka Arayüzü</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* GÖRSEL TASARIM REHBERİ:
           Minimalist, göz yormayan, iş odaklı karanlık tema.
           Gereksiz animasyon ve efektlerden arındırıldı.
        */
        :root {
            --bg-main: #0b0e14;
            --bg-sidebar: #151921;
            --bg-card: #1c232d;
            --border-color: #2d3748;
            --text-primary: #f7fafc;
            --text-secondary: #a0aec0;
            --accent: #6366f1; /* Indigo */
            --accent-hover: #4f46e5;
            --code-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SOL PANEL (NAVIGASYON & OTURUMLAR) --- */
        #sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .new-chat-btn:hover { background-color: var(--accent-hover); }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .session-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .session-item:hover { background: var(--bg-card); border-color: var(--border-color); }
        .session-item.active { background: var(--bg-card); border-color: var(--accent); }

        .session-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        /* --- MODEL SEÇİMİ (GİZLİ TASARIM) --- */
        .model-config {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .hidden-select-container {
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            padding: 10px;
            border: 1px dashed var(--border-color);
        }

        .hidden-select-container label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        #model-engine {
            width: 100%;
            background: transparent;
            border: none;
            color: transparent; /* Varsayılan olarak görünmez */
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            transition: color 0.3s;
        }

        .hidden-select-container:hover #model-engine {
            color: var(--accent); /* Üzerine gelince belirir */
        }

        /* --- ANA İÇERİK ALANI --- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 64px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: var(--bg-sidebar);
        }

        .search-box {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 300px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 0.85rem;
        }

        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
        }

        /* --- MESAJ TASARIMI --- */
        .message-wrapper {
            width: 100%;
            padding: 25px 20%;
            transition: background 0.2s;
        }

        .message-wrapper.ai { background-color: rgba(255,255,255,0.02); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }

        .message-content {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-avatar { background: var(--accent); color: white; }
        .ai-avatar { background: #10a37f; color: white; }

        .text-area {
            flex: 1;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            overflow-wrap: break-word;
        }

        /* Markdown Stilleri */
        pre {
            background: var(--code-bg);
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            position: relative;
        }

        code { font-family: 'Fira Code', monospace; font-size: 0.9rem; }

        .copy-code-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th { background: var(--bg-card); }

        /* --- GİRİŞ ALANI --- */
        #input-container {
            padding: 30px 20%;
            background: linear-gradient(transparent, var(--bg-main) 30%);
        }

        .input-box-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            padding: 5px;
        }

        .input-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        .action-group { display: flex; gap: 10px; }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .icon-btn:hover { background: var(--bg-main); color: var(--accent); }
        .send-btn { background: var(--accent); color: white; padding: 8px 16px; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: none; cursor: pointer; }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="new-chat">
                <i class="fa-solid fa-plus"></i> Yeni Oturum
            </button>
        </div>

        <div class="session-list" id="session-list">
            </div>

        <div class="model-config">
            <div class="hidden-select-container">
                <label><i class="fa-solid fa-microchip"></i> MODEL KATMANI</label>
                <select id="model-engine">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B Ultra</option>
                    <option value="llama3-8b-8192">Llama 3 8B Fast</option>
                    <option value="mixtral-8x7b-32768">Mixtral Neural</option>
                </select>
            </div>
            
            <div style="margin-top: 15px;">
                <button class="icon-btn" onclick="toggleSettings()" style="font-size: 0.8rem; display: flex; align-items: center; gap: 5px;">
                    <i class="fa-solid fa-sliders"></i> Parametre Ayarları
                </button>
            </div>
        </div>
    </aside>

    <main id="main-content">
        <header>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-chat" placeholder="Sohbet içinde ara...">
            </div>
            <div style="display:flex; gap:15px;">
                <button class="icon-btn" title="Karanlık/Aydınlık" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <button class="icon-btn" title="Hafızayı Temizle" onclick="app.clearCurrentSession()"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </header>

        <div id="chat-scroller">
            </div>

        <div id="input-container">
            <div class="input-box-wrapper">
                <textarea id="user-input" placeholder="Yapay zekaya bir mesaj gönderin..." rows="1"></textarea>
                <div class="input-actions">
                    <div class="action-group">
                        <button class="icon-btn" id="voice-input" title="Sesle Giriş"><i class="fa-solid fa-microphone"></i></button>
                        <button class="icon-btn" id="file-upload" title="Dosya Ekle"><i class="fa-solid fa-paperclip"></i></button>
                    </div>
                    <button class="send-btn" id="send-btn">
                        <span>Gönder</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
            <p style="text-align:center; font-size:0.7rem; color:var(--text-secondary); margin-top:10px;">
                ARENTA AI hata yapabilir. Önemli bilgileri kontrol edin.
            </p>
        </div>
    </main>

    <script>
        /**
         * ARENTA AI - ÇEKİRDEK MANTIK (CORE LOGIC)
         * Bu bölüm, uygulamanın durum yönetimini ve API iletişimini sağlar.
         */

        const API_KEY = "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";

        const app = {
            state: {
                sessions: [],
                currentSessionId: null,
                isProcessing: false,
                theme: 'dark'
            },

            init() {
                this.loadData();
                this.bindEvents();
                if (this.state.sessions.length === 0) {
                    this.createNewSession();
                } else {
                    this.switchSession(this.state.sessions[0].id);
                }
            },

            loadData() {
                const saved = localStorage.getItem('arenta_data');
                if (saved) {
                    this.state.sessions = JSON.parse(saved);
                }
            },

            saveData() {
                localStorage.setItem('arenta_data', JSON.stringify(this.state.sessions));
            },

            bindEvents() {
                document.getElementById('send-btn').onclick = () => this.handleSendMessage();
                document.getElementById('new-chat').onclick = () => this.createNewSession();
                document.getElementById('user-input').oninput = (e) => this.autoGrow(e.target);
                document.getElementById('user-input').onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.handleSendMessage();
                    }
                };

                // Arama Fonksiyonu
                document.getElementById('search-chat').oninput = (e) => this.filterMessages(e.target.value);
            },

            autoGrow(element) {
                element.style.height = "24px";
                element.style.height = (element.scrollHeight) + "px";
            },

            createNewSession() {
                const id = Date.now().toString();
                const newSession = {
                    id: id,
                    title: "Yeni Sohbet " + (this.state.sessions.length + 1),
                    messages: [],
                    systemPrompt: "Sen yardımsever ve profesyonel bir yapay zekasın."
                };
                this.state.sessions.unshift(newSession);
                this.saveData();
                this.renderSessionList();
                this.switchSession(id);
            },

            switchSession(id) {
                this.state.currentSessionId = id;
                this.renderSessionList();
                this.renderMessages();
            },

            renderSessionList() {
                const list = document.getElementById('session-list');
                list.innerHTML = '';
                this.state.sessions.forEach(s => {
                    const item = document.createElement('div');
                    item.className = `session-item ${s.id === this.state.currentSessionId ? 'active' : ''}`;
                    item.onclick = () => this.switchSession(s.id);
                    item.innerHTML = `
                        <div class="session-title"><i class="fa-regular fa-comment"></i> ${s.title}</div>
                        <i class="fa-solid fa-xmark" style="font-size:0.7rem; opacity:0.5;" onclick="app.deleteSession('${s.id}', event)"></i>
                    `;
                    list.appendChild(item);
                });
            },

            async handleSendMessage() {
                const input = document.getElementById('user-input');
                const text = input.value.trim();
                if (!text || this.state.isProcessing) return;

                const session = this.state.sessions.find(s => s.id === this.state.currentSessionId);
                
                // Başlık güncelleme (ilk mesajda)
                if (session.messages.length === 0) {
                    session.title = text.substring(0, 30) + (text.length > 30 ? "..." : "");
                    this.renderSessionList();
                }

                // Mesajı ekle
                const userMsg = { role: 'user', content: text };
                session.messages.push(userMsg);
                this.renderMessages();
                
                input.value = '';
                this.state.isProcessing = true;
                this.updateUIProcessing(true);

                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: document.getElementById('model-engine').value,
                            messages: [
                                { role: "system", content: session.systemPrompt },
                                ...session.messages
                            ],
                            temperature: 0.7
                        })
                    });

                    const data = await response.json();
                    if (data.choices) {
                        const aiContent = data.choices[0].message.content;
                        session.messages.push({ role: 'assistant', content: aiContent });
                        this.saveData();
                        this.renderMessages();
                    } else {
                        throw new Error(data.error.message);
                    }
                } catch (error) {
                    alert("HATA: " + error.message);
                } finally {
                    this.state.isProcessing = false;
                    this.updateUIProcessing(false);
                }
            },

            renderMessages() {
                const container = document.getElementById('chat-scroller');
                container.innerHTML = '';
                const session = this.state.sessions.find(s => s.id === this.state.currentSessionId);
                
                if (!session) return;

                session.messages.forEach(msg => {
                    const wrapper = document.createElement('div');
                    wrapper.className = `message-wrapper ${msg.role === 'assistant' ? 'ai' : 'user'}`;
                    
                    wrapper.innerHTML = `
                        <div class="message-content">
                            <div class="avatar ${msg.role === 'assistant' ? 'ai-avatar' : 'user-avatar'}">
                                ${msg.role === 'assistant' ? 'A' : 'S'}
                            </div>
                            <div class="text-area">
                                ${this.parseMarkdown(msg.content)}
                            </div>
                        </div>
                    `;
                    container.appendChild(wrapper);
                });
                container.scrollTop = container.scrollHeight;
            },

            parseMarkdown(text) {
                // Basit Markdown İşleyici
                let html = text
                    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") // Güvenlik
                    .replace(/```([\s\S]*?)```/g, (m, code) => {
                        return `<pre><button class="copy-code-btn" onclick="app.copyCode(this)">Kopyala</button><code>${code.trim()}</code></pre>`;
                    }) // Kod blokları
                    .replace(/`([^`]+)`/g, '<code>$1</code>') // Satır içi kod
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Kalın
                    .replace(/\n/g, '<br>'); // Satır atlama
                
                return html;
            },

            updateUIProcessing(isProc) {
                const btn = document.getElementById('send-btn');
                btn.disabled = isProc;
                btn.innerHTML = isProc ? '<i class="fa-solid fa-spinner fa-spin"></i>' : '<span>Gönder</span><i class="fa-solid fa-paper-plane"></i>';
            },

            copyCode(btn) {
                const code = btn.nextElementSibling.innerText;
                navigator.clipboard.writeText(code);
                btn.innerText = "Kopyalandı!";
                setTimeout(() => btn.innerText = "Kopyala", 2000);
            },

            deleteSession(id, event) {
                event.stopPropagation();
                this.state.sessions = this.state.sessions.filter(s => s.id !== id);
                if (this.state.currentSessionId === id) {
                    this.state.currentSessionId = this.state.sessions[0]?.id || null;
                }
                if (!this.state.currentSessionId) this.createNewSession();
                this.saveData();
                this.renderSessionList();
                this.renderMessages();
            },

            clearCurrentSession() {
                const session = this.state.sessions.find(s => s.id === this.state.currentSessionId);
                if (session) {
                    session.messages = [];
                    this.saveData();
                    this.renderMessages();
                }
            }
        };

        // Uygulamayı Başlat
        window.onload = () => app.init();

    </script>
</body>
</html>

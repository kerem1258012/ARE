<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENTA | ADVANCED AI INTERFACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ARENTA OS - CORE DESIGN SYSTEM
           Bu CSS bloğu, uygulamanın tüm görsel katmanlarını, animasyonlarını 
           ve grid sistemini yönetir. Gereksiz hiçbir görsel efekt kullanılmamıştır.
        */
        :root {
            --bg-deep: #030305;
            --bg-surface: #0a0a0c;
            --bg-card: #111114;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --text-high: #f8fafc;
            --text-mid: #94a3b8;
            --text-low: #475569;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-width: 300px;
            --header-height: 70px;
        }

        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-high);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- AUTHENTICATION ENGINE STYLES --- */
        #auth-portal {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #111111 0%, #030305 100%);
        }

        .auth-container {
            width: 420px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: authFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes authFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .auth-brand { text-align: center; margin-bottom: 35px; }
        .auth-brand h1 { font-weight: 800; font-size: 2rem; letter-spacing: -1px; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-low); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .input-field:focus { border-color: var(--accent-primary); outline: none; background: rgba(0,0,0,0.5); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }

        .primary-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .primary-btn:hover { background: var(--accent-secondary); transform: translateY(-2px); }

        .auth-switch { text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-mid); }
        .auth-switch span { color: var(--accent-primary); cursor: pointer; font-weight: 600; }

        /* --- CORE APPLICATION LAYOUT --- */
        #app-shell { display: none; width: 100%; height: 100%; }

        /* Sidebar Navigation */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
        }

        /* AI LOGO MASKING (DAİRESEL) */
        .brand-logo-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            flex-shrink: 0;
            background: #000;
        }
        .brand-logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .nav-header { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .nav-header h2 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }

        .session-manager { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .session-item {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text-mid);
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .session-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .session-item.active { background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.2); color: white; }

        /* Hidden Settings Component */
        .hidden-config {
            margin-top: auto;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px dashed var(--border-subtle);
        }
        .model-select-hidden {
            width: 100%;
            background: transparent;
            border: none;
            color: transparent;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            transition: color 0.3s;
        }
        .hidden-config:hover .model-select-hidden { color: var(--accent-primary); }

        /* Main Content Viewport */
        #viewport { flex: 1; display: flex; flex-direction: column; background: var(--bg-deep); }

        header {
            height: var(--header-height);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(3, 3, 5, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .status-badge {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.75rem; font-weight: 600; color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 12px; border-radius: 100px;
        }

        /* --- CHAT ENGINE UI --- */
        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 35px;
            scroll-behavior: smooth;
        }

        .message-block { display: flex; gap: 24px; animation: messageAppear 0.4s ease-out; }
        @keyframes messageAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message-block.user { flex-direction: row-reverse; }

        .message-content {
            max-width: 80%;
            padding: 20px 24px;
            border-radius: 20px;
            line-height: 1.7;
            font-size: 1rem;
        }
        .ai .message-content { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-high); }
        .user .message-content { background: var(--accent-primary); color: white; border-bottom-right-radius: 2px; }

        /* Markdown Handlers */
        pre { background: #000; padding: 20px; border-radius: 12px; border: 1px solid var(--border-subtle); margin: 15px 0; position: relative; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #a5b4fc; }
        table { border-collapse: collapse; width: 100%; margin: 15px 0; }
        th, td { border: 1px solid var(--border-subtle); padding: 12px; text-align: left; }
        th { background: rgba(255,255,255,0.05); }

        /* Input Interaction Zone */
        #input-container { padding: 30px 15%; background: linear-gradient(transparent, var(--bg-deep) 50%); }
        .input-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent-primary); box-shadow: 0 10px 40px rgba(99, 102, 241, 0.15); }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 10px 0;
            resize: none;
            max-height: 200px;
            min-height: 24px;
        }

        .icon-btn {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; color: var(--text-mid);
            cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.05); color: var(--accent-primary); }
        .send-btn { background: var(--accent-primary); color: white; }
        .send-btn:hover { background: var(--accent-secondary); transform: scale(1.05); }

        /* --- NOTIFICATION SYSTEM (TOAST) --- */
        #notification-center {
            position: fixed;
            top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 11000;
        }
        .toast {
            padding: 16px 24px; border-radius: 12px; background: var(--bg-card);
            border: 1px solid var(--border-subtle); color: white;
            font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    </style>
</head>
<body>

    <div id="notification-center"></div>

    <div id="auth-portal">
        <div class="auth-container" id="view-login">
            <div class="auth-brand">
                <h1>ARENTA AI</h1>
                <p>Güvenli Erişim Protokolü</p>
            </div>
            <div class="form-group">
                <label class="form-label">Operatör Adı</label>
                <input type="text" id="login-user" class="input-field" placeholder="Kullanıcı adınız">
            </div>
            <div class="form-group">
                <label class="form-label">Erişim Şifresi</label>
                <input type="password" id="login-pass" class="input-field" placeholder="••••••••">
            </div>
            <button class="primary-btn" onclick="Engine.Auth.attemptLogin()">SİSTEME GİRİŞ YAP</button>
            <div class="auth-switch">
                Yetkiniz yok mu? <span onclick="Engine.UI.switchAuth('register')">Yeni Kayıt Oluştur</span>
            </div>
        </div>

        <div class="auth-container" id="view-register" style="display:none;">
            <div class="auth-brand">
                <h1>Yeni Operatör</h1>
                <p>Sistem yetki tanımlama ekranı</p>
            </div>
            <div class="form-group">
                <label class="form-label">Kullanıcı Adı Belirleyin</label>
                <input type="text" id="reg-user" class="input-field">
            </div>
            <div class="form-group">
                <label class="form-label">Şifre Belirleyin</label>
                <input type="password" id="reg-pass" class="input-field">
            </div>
            <button class="primary-btn" onclick="Engine.Auth.attemptRegister()">YETKİYİ ONAYLA</button>
            <div class="auth-switch">
                Zaten operatör müsünüz? <span onclick="Engine.UI.switchAuth('login')">Giriş Yap</span>
            </div>
        </div>
    </div>

    <div id="app-shell">
        <aside id="sidebar">
            <div class="nav-header">
                <div class="brand-logo-circle">
                    <img src="https://i.imgur.com/oI8HOo2.png" alt="Arenta AI">
                </div>
                <h2>ARENTA</h2>
            </div>

            <button class="primary-btn" style="margin-bottom: 25px; padding: 12px;" onclick="Engine.Chat.newSession()">
                <i class="fa-solid fa-plus"></i> Yeni Oturum
            </button>

            <div class="session-manager" id="session-list">
                </div>

            <div class="hidden-config">
                <label class="form-label" style="margin-bottom:5px; font-size:0.6rem;">Neural Engine</label>
                <select id="model-select" class="model-select-hidden">
                    <option value="llama-3.3-70b-versatile">LLama-3.3-70B-Turbo</option>
                    <option value="llama3-8b-8192">LLama-3-8B-Edge</option>
                    <option value="mixtral-8x7b-32768">Mixtral-8x7B-Neural</option>
                </select>
            </div>

            <button class="icon-btn" style="width:100%; margin-top:15px; border:1px solid var(--border-subtle);" onclick="Engine.Auth.logout()">
                <i class="fa-solid fa-power-off"></i> &nbsp; Oturumu Kapat
            </button>
        </aside>

        <main id="viewport">
            <header>
                <div style="display:flex; align-items:center; gap:20px;">
                    <div class="status-badge"><span style="width:6px; height:6px; background:var(--success); border-radius:50%;"></span> SYSTEM READY</div>
                    <div id="active-op-label" style="font-size:0.8rem; font-weight:700; color:var(--text-mid);">OP: ---</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="icon-btn" onclick="Engine.Chat.exportSession()"><i class="fa-solid fa-download"></i></button>
                    <button class="icon-btn" onclick="Engine.Chat.clearHistory()"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </header>

            <div id="chat-scroller">
                </div>

            <div id="input-container">
                <div class="input-wrapper">
                    <button class="icon-btn"><i class="fa-solid fa-paperclip"></i></button>
                    <textarea id="main-input" placeholder="Yapay zekaya bir talimat verin..." rows="1" oninput="Engine.UI.resizeInput(this)"></textarea>
                    <button class="icon-btn send-btn" id="btn-send" onclick="Engine.Chat.process()"><i class="fa-solid fa-bolt-lightning"></i></button>
                </div>
                <p style="text-align:center; font-size:0.65rem; color:var(--text-low); margin-top:15px; letter-spacing:0.5px;">
                    ARENTA V4.0 // END-TO-END ENCRYPTED AI INTERFACE
                </p>
            </div>
        </main>
    </div>

    <script>
        /**
         * ARENTA CORE ENGINE v4.0
         * Tamamen modüler, nesne yönelimli ve güvenli mimari.
         */

        const API_KEY = "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";

        const Engine = {
            // Veri Depolama ve Durum Yönetimi
            State: {
                activeUser: null,
                sessions: [],
                currentSessionId: null,
                isWorking: false
            },

            // Kimlik Doğrulama Modülü
            Auth: {
                getUsers: () => JSON.parse(localStorage.getItem('arenta_registry') || '[]'),
                
                attemptRegister: function() {
                    const u = document.getElementById('reg-user').value.trim();
                    const p = document.getElementById('reg-pass').value.trim();
                    if(!u || !p) return Engine.UI.notify("Tüm alanları doldurun!", "warning");

                    let users = this.getUsers();
                    if(users.some(x => x.username === u)) return Engine.UI.notify("Operatör adı kullanımda!", "danger");

                    users.push({ username: u, password: btoa(p) }); // Simple base64 "hash"
                    localStorage.setItem('arenta_registry', JSON.stringify(users));
                    Engine.UI.notify("Operatör yetkilendirildi. Giriş yapın.", "success");
                    Engine.UI.switchAuth('login');
                },

                attemptLogin: function() {
                    const u = document.getElementById('login-user').value.trim();
                    const p = document.getElementById('login-pass').value.trim();
                    
                    const user = this.getUsers().find(x => x.username === u && x.password === btoa(p));
                    if(user) {
                        sessionStorage.setItem('arenta_session_active', u);
                        Engine.init();
                        Engine.UI.notify("Hoş geldin, Operatör " + u, "success");
                    } else {
                        Engine.UI.notify("Erişim reddedildi! Hatalı şifre.", "danger");
                    }
                },

                logout: () => { sessionStorage.clear(); location.reload(); }
            },

            // Sohbet ve API Modülü
            Chat: {
                newSession: function() {
                    const id = 'sess_' + Date.now();
                    const newSess = { id, title: "Yeni Analiz", messages: [] };
                    Engine.State.sessions.unshift(newSess);
                    Engine.State.currentSessionId = id;
                    Engine.Storage.save();
                    Engine.UI.renderSessions();
                    Engine.UI.renderMessages();
                },

                process: async function() {
                    const el = document.getElementById('main-input');
                    const text = el.value.trim();
                    if(!text || Engine.State.isWorking) return;

                    const sess = Engine.State.sessions.find(x => x.id === Engine.State.currentSessionId);
                    if(sess.messages.length === 0) sess.title = text.substring(0, 25) + "...";

                    sess.messages.push({ role: 'user', content: text });
                    Engine.UI.renderMessages();
                    el.value = '';
                    
                    Engine.State.isWorking = true;
                    Engine.UI.toggleLoading(true);

                    try {
                        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                            method: "POST",
                            headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                            body: JSON.stringify({
                                model: document.getElementById('model-select').value,
                                messages: [{ role: "system", content: "Sen Arenta AI'sın. Yanıtların profesyonel, teknik ve Markdown formatında olmalı." }, ...sess.messages],
                                temperature: 0.6
                            })
                        });

                        const data = await response.json();
                        const aiMsg = data.choices[0].message.content;
                        
                        sess.messages.push({ role: 'assistant', content: aiMsg });
                        Engine.Storage.save();
                        Engine.UI.renderMessages();
                    } catch (e) {
                        Engine.UI.notify("API Hatası: " + e.message, "danger");
                    } finally {
                        Engine.State.isWorking = false;
                        Engine.UI.toggleLoading(false);
                        Engine.UI.renderSessions();
                    }
                },

                exportSession: function() {
                    const sess = Engine.State.sessions.find(x => x.id === Engine.State.currentSessionId);
                    const blob = new Blob([JSON.stringify(sess, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `arenta_export_${sess.id}.json`; a.click();
                }
            },

            // Kullanıcı Arayüzü Modülü
            UI: {
                renderMessages: function() {
                    const container = document.getElementById('chat-scroller');
                    container.innerHTML = '';
                    const sess = Engine.State.sessions.find(x => x.id === Engine.State.currentSessionId);
                    
                    sess.messages.forEach(m => {
                        const div = document.createElement('div');
                        div.className = `message-block ${m.role === 'assistant' ? 'ai' : 'user'}`;
                        div.innerHTML = `
                            ${m.role === 'assistant' ? '<div class="brand-logo-circle" style="width:32px; height:32px;"><img src="https://i.imgur.com/oI8HOo2.png"></div>' : ''}
                            <div class="message-content">${this.parseMarkdown(m.content)}</div>
                        `;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                },

                parseMarkdown: (text) => {
                    return text
                        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                },

                renderSessions: function() {
                    const list = document.getElementById('session-list');
                    list.innerHTML = '';
                    Engine.State.sessions.forEach(s => {
                        const div = document.createElement('div');
                        div.className = `session-item ${s.id === Engine.State.currentSessionId ? 'active' : ''}`;
                        div.onclick = () => { Engine.State.currentSessionId = s.id; Engine.UI.renderMessages(); Engine.UI.renderSessions(); };
                        div.innerHTML = `<i class="fa-regular fa-comment"></i> <span>${s.title}</span>`;
                        list.appendChild(div);
                    });
                },

                notify: function(msg, type) {
                    const center = document.getElementById('notification-center');
                    const toast = document.createElement('div');
                    toast.className = `toast`;
                    toast.style.borderLeft = `4px solid var(--${type})`;
                    toast.innerHTML = `<i class="fa-solid fa-circle-info" style="color:var(--${type})"></i> ${msg}`;
                    center.appendChild(toast);
                    setTimeout(() => toast.remove(), 4000);
                },

                switchAuth: (v) => {
                    document.getElementById('view-login').style.display = v === 'login' ? 'block' : 'none';
                    document.getElementById('view-register').style.display = v === 'register' ? 'block' : 'none';
                },

                resizeInput: (el) => { el.style.height = '24px'; el.style.height = el.scrollHeight + 'px'; },

                toggleLoading: (b) => {
                    const btn = document.getElementById('btn-send');
                    btn.innerHTML = b ? '<i class="fa-solid fa-spinner fa-spin"></i>' : '<i class="fa-solid fa-bolt-lightning"></i>';
                    btn.disabled = b;
                }
            },

            // Yerel Depolama Modülü
            Storage: {
                save: () => localStorage.setItem(`arenta_data_${Engine.State.activeUser}`, JSON.stringify(Engine.State.sessions)),
                load: () => {
                    const d = localStorage.getItem(`arenta_data_${Engine.State.activeUser}`);
                    Engine.State.sessions = d ? JSON.parse(d) : [];
                }
            },

            // Başlatıcı
            init: function() {
                const user = sessionStorage.getItem('arenta_session_active');
                if(!user) return;

                this.State.activeUser = user;
                document.getElementById('auth-portal').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                document.getElementById('active-op-label').innerText = "OPERATOR: " + user.toUpperCase();

                this.Storage.load();
                if(this.State.sessions.length === 0) this.Chat.newSession();
                else {
                    this.State.currentSessionId = this.State.sessions[0].id;
                    this.UI.renderSessions();
                    this.UI.renderMessages();
                }
            }
        };

        // Uygulama Tetikleyici
        window.onload = () => Engine.init();

        // Klavye Kısayolu: Enter ile Gönder
        document.getElementById('main-input').onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); Engine.Chat.process(); }
        }
    </script>
</body>
</html>

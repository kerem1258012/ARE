<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arenta X Ai</title>

<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  /* ------------------- GLOBAL ------------------- */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Space Grotesk', sans-serif; }
  body {
    background: #050509;
    color: #fff;
    overflow: hidden;
  }

  /* ------------------- HEADER ------------------- */
  header {
    position: fixed;
    top:0; left:0; right:0;
    height:60px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 30px;
    background: rgba(5,5,9,0.4);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index:10;
  }

  header .logo {
    font-size:1.8rem;
    font-weight:700;
    background: linear-gradient(90deg,#8A2BE2,#00FFFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px #8A2BE2, 0 0 20px #00FFFF;
  }

  header .menu {
    font-size:1.2rem;
    cursor:pointer;
    color:#fff;
    transition:0.3s;
  }
  header .menu:hover { color:#8A2BE2; }

  /* ------------------- MAIN CHAT ------------------- */
  main {
    position: absolute;
    top:60px; bottom:80px; left:0; right:0;
    display:flex; justify-content:center; align-items:flex-start;
    padding:20px;
  }

  .chat-window {
    width: 600px;
    max-width: 95%;
    height: calc(100% - 40px);
    background: rgba(15,15,25,0.5);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    display:flex; flex-direction:column;
    padding:20px;
    overflow-y:auto;
    box-shadow: 0 0 20px rgba(138,43,226,0.2), 0 0 30px rgba(0,255,255,0.1);
  }

  .message {
    max-width:70%;
    margin:10px 0;
    padding:12px 16px;
    border-radius:12px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.05);
    word-wrap: break-word;
    position: relative;
    font-size:0.95rem;
  }

  .message.user {
    align-self:flex-end;
    background: rgba(0,255,255,0.2);
    border-color: rgba(0,255,255,0.3);
    color:#00FFFF;
  }

  .message.ai {
    align-self:flex-start;
    background: rgba(138,43,226,0.2);
    border-color: rgba(138,43,226,0.3);
    color:#8A2BE2;
  }

  .message .time {
    font-size:0.7rem;
    color: rgba(255,255,255,0.5);
    position: absolute;
    bottom:2px;
    right:8px;
  }

  /* ------------------- INPUT ------------------- */
  .input-bar {
    position: fixed;
    bottom:0; left:0; right:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px 30px;
    background: rgba(5,5,9,0.6);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .input-bar input {
    flex:1;
    padding:12px 16px;
    border-radius:50px;
    border:none;
    background: rgba(255,255,255,0.05);
    color:#fff;
    outline:none;
    font-size:1rem;
    backdrop-filter: blur(8px);
    margin:0 10px;
  }

  .icon {
    font-size:1.5rem;
    cursor:pointer;
    transition:0.3s;
  }
  .icon:hover { transform: scale(1.2); }

  .icon.mic { color:#00FFFF; }
  .icon.send { color:#8A2BE2; }

  /* ------------------- PARTICLE BACKGROUND ------------------- */
  canvas#bgCanvas {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:-1;
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
  <div class="logo">Arenta X Ai</div>
  <div class="menu">Hakkında</div>
</header>

<main>
  <div class="chat-window" id="chatWindow"></div>
</main>

<div class="input-bar">
  <div class="icon mic" id="micBtn">🎤</div>
  <input type="text" id="userInput" placeholder="Mesajınızı yazın veya konuşun...">
  <div class="icon send" id="sendBtn">➡️</div>
</div>

<script>
  /* ------------------- CHAT FUNCTION ------------------- */
  const chatWindow = document.getElementById('chatWindow');
  const input = document.getElementById('userInput');

  async function sendMessage() {
    const text = input.value.trim();
    if(!text) return;

    // Kullanıcı mesajını ekle
    addMessage(text,'user');
    input.value = '';

    const startTime = performance.now();

    // Groq API isteği (placeholder API key)
    const response = await fetch('https://api.groq.ai/v1/llama-3/generate', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer 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'
      },
      body: JSON.stringify({ prompt:text, max_tokens:200 })
    });

    const data = await response.json();
    const aiText = data.output_text || 'AI cevap veremedi.';

    const endTime = performance.now();
    const elapsed = Math.round(endTime - startTime);

    addMessage(`${aiText}\n\nGroq Speed: ${elapsed}ms`,'ai');

    // TTS
    speakText(aiText);
  }

  function addMessage(msg,type) {
    const div = document.createElement('div');
    div.classList.add('message',type);
    div.innerHTML = msg.replace(/\n/g,'<br>');
    const timeSpan = document.createElement('span');
    timeSpan.classList.add('time');
    timeSpan.textContent = new Date().toLocaleTimeString();
    div.appendChild(timeSpan);
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  input.addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });

  /* ------------------- STT (Web Speech API) ------------------- */
  const micBtn = document.getElementById('micBtn');
  let recognition;
  if('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'tr-TR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = function(e) {
      input.value = e.results[0][0].transcript;
    };
  }

  micBtn.addEventListener('click', ()=>{
    if(recognition) recognition.start();
  });

  /* ------------------- TTS (Edge TTS) ------------------- */
  function speakText(text) {
    if('speechSynthesis' in window) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'tr-TR';
      utter.voice = speechSynthesis.getVoices().find(v=>v.name.includes('Ahmet')) || speechSynthesis.getVoices()[0];
      window.speechSynthesis.speak(utter);
    }
  }

  /* ------------------- PARTICLE BACKGROUND ------------------- */
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let w=canvas.width=window.innerWidth;
  let h=canvas.height=window.innerHeight;

  const particles = [];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*w,
      y:Math.random()*h,
      r: Math.random()*2+1,
      dx:(Math.random()-0.5)*0.2,
      dy:(Math.random()-0.5)*0.2,
      color: `rgba(${Math.floor(138+Math.random()*117)},${Math.floor(43+Math.random()*212)},${Math.floor(226+Math.random()*29)},0.2)`
    });
  }

  function animate() {
    ctx.clearRect(0,0,w,h);
    for(let p of particles){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>w)p.dx*=-1;
      if(p.y<0||p.y>h)p.dy*=-1;
    }
    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize',()=>{
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arenta X Ai | Future Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #030305;
            --accent-purple: #8A2BE2;
            --accent-blue: #00FFFF;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Gelişmiş Mesh Gradient Arka Plan */
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
            transition: transform 0.3s ease-out;
            pointer-events: none;
        }

        /* Üst Menü */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        /* Ana Sohbet Alanı */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }

        #chat-container {
            width: 100%;
            max-width: 1000px;
            height: 75vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.02);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Özel Kaydırma Çubuğu */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: rgba(138, 43, 226, 0.3); border-radius: 10px; }
        #messages::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 255, 0.5); }

        /* Mesaj Balonları */
        .message {
            max-width: 85%;
            padding: 16px 22px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            word-wrap: break-word;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.08), rgba(0, 255, 255, 0.02));
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.05);
        }

        .ai-message {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.12), rgba(138, 43, 226, 0.03));
            border: 1px solid rgba(138, 43, 226, 0.25);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.05);
        }

        .ai-message code {
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent-blue);
        }

        .speed-tag {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-top: 10px;
            opacity: 0.8;
            font-family: 'Space Grotesk', monospace;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Yükleme Animasyonu (Loading) */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            align-items: center;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--accent-blue); }
        }

        /* Giriş Alanı */
        .input-wrapper {
            width: 100%;
            max-width: 1000px;
            margin-top: 25px;
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(138, 43, 226, 0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px 20px;
            font-size: 1.05rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.03);
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid transparent;
        }

        .icon-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.08);
            color: var(--accent-blue);
            transform: scale(1.08);
            border-color: rgba(0, 255, 255, 0.3);
        }

        .icon-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #send-btn {
            background: linear-gradient(135deg, var(--accent-purple), #4B0082);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
            border: 1px solid rgba(138, 43, 226, 0.5);
        }

        #send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            color: #fff;
        }

        /* STT Kayıt Efekti */
        .recording {
            color: #ff3366 !important;
            border-color: #ff3366 !important;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
            animation: pulseRecord 1.5s infinite;
        }

        @keyframes pulseRecord { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 51, 102, 0.6); } 
            100% { transform: scale(1); } 
        }

    </style>
</head>
<body>

    <div class="mesh-gradient" id="bg"></div>

    <header>
        <div class="logo">Arenta X Ai</div>
        <button class="icon-btn" title="Ayarlar" style="width:40px; height:40px; font-size:1rem;">
            <i class="fa-solid fa-sliders"></i>
        </button>
    </header>

    <main>
        <div id="chat-container">
            <div id="messages">
                <div class="message ai-message">
                    Sistem aktif. Güvenlik protokolleri devrede. Arenta X Ai dinliyor...
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <button class="icon-btn" id="mic-btn" title="Sesli Komut">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <input type="text" id="user-input" placeholder="Sisteme komut gir veya sesli konuş..." autocomplete="off">
            <button class="icon-btn" id="send-btn" title="Gönder">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <script>
        // API Yapılandırması
        const GROQ_API_KEY = "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";
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL_NAME = "llama3-70b-8192"; // Daha zeki yanıtlar için 70b modeli

        // DOM Elementleri
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const bg = document.getElementById('bg');

        let isWaiting = false; // Çift gönderimi engellemek için durum kontrolü
        let conversationHistory = [
            { role: "system", content: "Senin adın Arenta X Ai. Son derece zeki, net, profesyonel ve hafif 'cyberpunk/hacker' tarzı bir üslupla Türkçe konuşan modern bir yapay zekasın." }
        ];

        // 1. Arka Plan Fare Etkileşimi (Performanslı)
        document.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.015;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.015;
                bg.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // 2. Metinden Sese (TTS) - Edge Neural Kalitesinde
        function speakText(text) {
            if (!window.speechSynthesis) return;
            
            // Önceki konuşmayı kes (üst üste binmemesi için)
            window.speechSynthesis.cancel(); 

            // Kod bloklarını ve markdown işaretlerini temizle ki düzgün okusun
            const cleanText = text.replace(/```[\s\S]*?```/g, "Burada bir kod bloğu var.")
                                  .replace(/[*#_]/g, "");

            const utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            
            // Türkçe sesi bul (Google Türkçe, Microsoft Tolga/Emel vb.)
            const trVoice = voices.find(v => v.lang === 'tr-TR' && (v.name.includes('Neural') || v.name.includes('Google')));
            if (trVoice) {
                utterance.voice = trVoice;
            } else {
                // Alternatif bulamazsa standart Türkçe ses
                utterance.voice = voices.find(v => v.lang.startsWith('tr')); 
            }
            
            utterance.rate = 1.05; // Çok hafif hızlı, dinamik
            utterance.pitch = 0.9; // Biraz daha tok, robotik olmayan bir ses tonu
            
            window.speechSynthesis.speak(utterance);
        }

        // Ses motorunu hazırla
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        // 3. Sesten Metne (STT) - Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false; // Tek cümle alıp durur
            recognition.interimResults = false;
            
            micBtn.onclick = () => {
                if (micBtn.classList.contains('recording')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            };

            recognition.onstart = () => {
                micBtn.classList.add('recording');
                userInput.placeholder = "Dinleniyor...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                // İstersen burada otomatik gönderim için handleSend() çağırabilirsin
            };

            recognition.onerror = (e) => {
                console.error("Mikrofon Hatası:", e.error);
                resetMic();
            };

            recognition.onend = () => resetMic();

            function resetMic() {
                micBtn.classList.remove('recording');
                userInput.placeholder = "Sisteme komut gir veya sesli konuş...";
            }
        } else {
            micBtn.style.display = 'none'; // Tarayıcı desteklemiyorsa butonu gizle
        }

        // 4. UI Yardımcı Fonksiyonları
        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function formatMessage(text) {
            // Basit Markdown ve Satır atlama parse işlemi
            return text.replace(/\n/g, '<br>')
                       .replace(/`([^`]+)`/g, '<code>$1</code>') // Inline kod
                       .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>'); // Kalın yazı
        }

        function createLoadingIndicator() {
            const div = document.createElement('div');
            div.className = 'message ai-message';
            div.id = 'loading-indicator';
            div.innerHTML = `
                <div class="typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            `;
            messagesDiv.appendChild(div);
            scrollToBottom();
            return div;
        }

        function appendMessage(role, text, speed = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            msgDiv.innerHTML = formatMessage(text);

            if (speed !== null) {
                const speedTag = document.createElement('div');
                speedTag.className = 'speed-tag';
                speedTag.innerHTML = `<i class="fa-solid fa-bolt"></i> İşlem Hızı: ${speed}ms`;
                msgDiv.appendChild(speedTag);
            }

            messagesDiv.appendChild(msgDiv);
            scrollToBottom();
        }

        // 5. Groq API Entegrasyonu (Gerçek İstek)
        async function getAIResponse(userText) {
            isWaiting = true;
            sendBtn.disabled = true;
            userInput.disabled = true;
            
            conversationHistory.push({ role: "user", content: userText });
            const loadingIndicator = createLoadingIndicator();
            const startTime = performance.now();
            
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                if (!response.ok) throw new Error(`API Hatası: ${response.status}`);

                const data = await response.json();
                const endTime = performance.now();
                const duration = Math.round(endTime - startTime);
                
                const aiText = data.choices[0].message.content;
                conversationHistory.push({ role: "assistant", content: aiText });

                // Yükleme animasyonunu kaldır
                loadingIndicator.remove();
                
                // Mesajı ekle ve seslendir
                appendMessage('ai', aiText, duration);
                speakText(aiText);

            } catch (error) {
                console.error(error);
                loadingIndicator.remove();
                appendMessage('ai', "Bağlantı protokolünde bir hata tespit edildi. Lütfen sistem durumunu kontrol et.");
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        // 6. Olay Dinleyicileri (Event Listeners)
        function handleSend() {
            const text = userInput.value.trim();
            if (!text || isWaiting) return;

            // STT devam ediyorsa durdur
            if (micBtn.classList.contains('recording')) micBtn.click(); 

            appendMessage('user', text);
            userInput.value = '';
            getAIResponse(text);
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { 
            if (e.key === 'Enter') handleSend(); 
        };
        
        // Sayfa yüklendiğinde input'a odaklan
        window.onload = () => userInput.focus();

    </script>
</body>
</html>

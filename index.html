<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Modern AI Chat Interface">
    <meta name="theme-color" content="#09090b">
    <title>Nexus Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* * ==========================================
         * 1. CSS VARIABLES & THEME CONFIGURATION
         * ==========================================
         */
        :root {
            /* Light Theme (Base) */
            --bg-base: #ffffff;
            --bg-elevated: #f4f4f5;
            --bg-element: #e4e4e7;
            --border-color: #e4e4e7;
            --text-primary: #09090b;
            --text-secondary: #71717a;
            --text-muted: #a1a1aa;
            --brand-primary: #18181b;
            --brand-hover: #27272a;
            --brand-text: #ffffff;
            --danger-bg: #fef2f2;
            --danger-text: #ef4444;
            --success-bg: #ecfdf5;
            --success-text: #10b981;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --transition-base: all 0.2s ease-in-out;
        }

        /* Dark Theme overrides */
        [data-theme="dark"] {
            --bg-base: #09090b;
            --bg-elevated: #18181b;
            --bg-element: #27272a;
            --border-color: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --brand-primary: #ffffff;
            --brand-hover: #f4f4f5;
            --brand-text: #09090b;
            --danger-bg: #7f1d1d;
            --danger-text: #fca5a5;
            --success-bg: #064e3b;
            --success-text: #6ee7b7;
        }

        /* * ==========================================
         * 2. RESET & NORMALIZATION
         * ==========================================
         */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        a { text-decoration: none; color: inherit; }
        button, input, textarea { font-family: inherit; border: none; outline: none; background: none; }
        button { cursor: pointer; }
        ul { list-style: none; }

        /* * ==========================================
         * 3. UTILITY CLASSES
         * ==========================================
         */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .flex-col { flex-direction: column; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }

        /* * ==========================================
         * 4. COMPONENTS
         * ==========================================
         */
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.875rem;
            transition: var(--transition-base);
            white-space: nowrap;
        }
        .btn-primary {
            background-color: var(--brand-primary);
            color: var(--brand-text);
        }
        .btn-primary:hover:not(:disabled) { background-color: var(--brand-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-ghost {
            color: var(--text-secondary);
            padding: 0.5rem;
        }
        .btn-ghost:hover {
            background-color: var(--bg-element);
            color: var(--text-primary);
        }

        /* Inputs */
        .input-group { margin-bottom: 1rem; }
        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.375rem;
            color: var(--text-primary);
        }
        .input-control {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: border-color 0.15s ease;
        }
        .input-control:focus { border-color: var(--text-secondary); }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            padding: 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease-out;
            min-width: 250px;
        }
        .toast.error { background-color: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-text); }
        .toast.success { background-color: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-text); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(10px); }
        }

        /* * ==========================================
         * 5. LAYOUTS: AUTHENTICATION
         * ==========================================
         */
        #view-auth {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-elevated);
        }

        .auth-card {
            background-color: var(--bg-base);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; }
        .auth-header p { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.25rem; }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .auth-link {
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* * ==========================================
         * 6. LAYOUTS: MAIN APPLICATION
         * ==========================================
         */
        #view-app {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        .app-sidebar {
            width: 260px;
            background-color: var(--bg-elevated);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* The Exact Requested Logo Styling */
        .avatar-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background-color: var(--bg-element);
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .workspace-name { font-weight: 600; font-size: 0.875rem; }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .history-list { display: flex; flex-direction: column; gap: 0.25rem; }
        .history-item {
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-base);
        }
        .history-item:hover { background-color: var(--bg-element); color: var(--text-primary); }
        .history-item.active { background-color: var(--bg-element); color: var(--text-primary); font-weight: 500; }
        .history-item-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Main Content Area */
        .app-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            position: relative;
        }

        .app-header {
            height: 60px;
            padding: 0 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 0;
            scroll-behavior: smooth;
        }
        
        .chat-content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding: 0 1.5rem;
        }

        .message-row { display: flex; gap: 1rem; }
        .message-row.user { flex-direction: row-reverse; }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-md);
            background-color: var(--bg-element);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .message-row.ai .message-avatar {
            border-radius: 50%;
            overflow: hidden;
            padding: 0;
        }
        .message-row.ai .message-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .message-body {
            max-width: 85%;
            font-size: 0.9375rem;
            line-height: 1.6;
            color: var(--text-primary);
        }
        .message-row.user .message-body {
            background-color: var(--bg-elevated);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-lg);
            border-top-right-radius: 4px;
        }
        .message-row.ai .message-body { padding-top: 0.25rem; }

        /* Markdown Styles */
        .message-body p { margin-bottom: 0.75rem; }
        .message-body p:last-child { margin-bottom: 0; }
        .message-body pre {
            background-color: var(--bg-elevated);
            padding: 1rem;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid var(--border-color);
        }
        .message-body code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background-color: var(--bg-element);
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }
        .message-body pre code { background-color: transparent; padding: 0; }
        .message-body strong { font-weight: 600; }
        .message-body ul { padding-left: 1.5rem; margin-bottom: 0.75rem; list-style-type: disc; }

        /* Input Area */
        .input-section {
            padding: 1.5rem;
            background: linear-gradient(to top, var(--bg-base) 60%, transparent);
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 0.5rem;
            display: flex;
            align-items: flex-end;
            box-shadow: var(--shadow-sm);
        }
        .input-wrapper:focus-within { border-color: var(--text-secondary); }

        .compose-textarea {
            width: 100%;
            max-height: 200px;
            min-height: 44px;
            padding: 0.5rem 0.75rem;
            resize: none;
            color: var(--text-primary);
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        .compose-actions {
            display: flex;
            padding: 0.25rem;
            flex-shrink: 0;
        }
        .send-button {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            background-color: var(--brand-primary);
            color: var(--brand-text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-base);
        }
        .send-button:hover:not(:disabled) { background-color: var(--brand-hover); }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* SVGs */
        svg { width: 1.25rem; height: 1.25rem; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>

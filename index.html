<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arenta X Ai Chat</title>
<style>
  body { font-family: Arial; background: #f0f0f0; }
  #chat { max-width: 500px; margin: 50px auto; background: #fff; padding: 10px; border-radius: 10px; height: 500px; overflow-y: auto; }
  .msg { padding: 8px 12px; margin: 5px; border-radius: 20px; max-width: 70%; }
  .user { background: #dcf8c6; text-align: right; margin-left: auto; }
  .ai { background: #eee; text-align: left; margin-right: auto; }
  .ai-label { font-size: 10px; color: #555; margin-bottom: 3px; }
  #inputArea { max-width: 500px; margin: auto; display: flex; gap: 5px; }
  #inputArea input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
  #inputArea button { padding: 10px 15px; border: none; border-radius: 20px; background: #4CAF50; color: #fff; cursor: pointer; }
</style>
</head>
<body>

<div id="chat"></div>
<div id="inputArea">
  <input type="text" id="userInput" placeholder="Mesaj yaz...">
  <button onclick="sendMessage()">Gönder</button>
</div>
<audio id="ttsAudio"></audio>

<script>
// Buraya Vercel backend URL'ini koy
const BACKEND_URL = "https://are-53zlwxmhn-kerem1258012s-projects.vercel.app/api/ask";

async function sendMessage() {
  const input = document.getElementById('userInput');
  const chat  = document.getElementById('chat');
  const text  = input.value.trim();
  if (!text) return;

  // Kullanıcı mesajı
  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  chat.appendChild(userMsg);
  chat.scrollTop = chat.scrollHeight;
  input.value = '';

  try {
    const res = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // AI cevabı
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg ai';
    const label = document.createElement('div');
    label.className = 'ai-label';
    label.textContent = 'Arenta X Ai';
    aiMsg.appendChild(label);

    const msgText = document.createElement('div');
    msgText.textContent = data.reply ?? "Cevap yok";
    aiMsg.appendChild(msgText);

    chat.appendChild(aiMsg);
    chat.scrollTop = chat.scrollHeight;

  } catch(e) {
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg ai';
    const label = document.createElement('div');
    label.className = 'ai-label';
    label.textContent = 'Arenta X Ai';
    aiMsg.appendChild(label);

    const msgText = document.createElement('div');
    msgText.textContent = 'Sunucu hatası: ' + e.message;
    aiMsg.appendChild(msgText);

    chat.appendChild(aiMsg);
    chat.scrollTop = chat.scrollHeight;
  }
}
</script>

</body>
</html>
